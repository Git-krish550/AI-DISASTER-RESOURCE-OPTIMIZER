<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Disaster Resource Optimizer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
margin:0;
color:grey;
text-align:center;
}

header{
background:rgba(0,0,0,0.4);
padding:20px;
font-size:32px;
font-weight:bold;
backdrop-filter:blur(10px);
}

.container{
margin-top:30px;
}

input,select{
padding:12px;
margin:10px;
width:260px;
font-size:16px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:12px 25px;
background:#00c6ff;
color:white;
border:none;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0072ff;
transform:scale(1.05);
}

.voiceBtn{
background:#ff416c;
}

.summary{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
display:inline-block;
margin-top:20px;
backdrop-filter:blur(10px);
}

.dashboard{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:rgba(255,255,255,0.15);
padding:20px;
margin:12px;
border-radius:12px;
backdrop-filter:blur(12px);
width:190px;
font-size:18px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.chart{
width:65%;
margin:auto;
margin-top:40px;
}

.map{
margin-top:40px;
}

.inventoryTitle{
font-size:24px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
🚨 AI Disaster Resource Optimizer
<br>
<select id="language" onchange="changelanguage()">
<option value="en">English</option>
<option>value="hi">हिन्दी</option>
<option>value="mr">मराठी</option>
</select>
</header>
<div style="background:#fff;padding:15px;margin:20px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);">

<h3>🌍 Disaster Monitoring Status</h3>

<p>System Status: <span style="color:green;font-weight:bold;">Active</span></p>

<p>Last Data Update: <span id="time"></span></p>

</div>

<div class="container">

<h2 id="analysisTitle">Disaster Analysis</h2>
<h3 id="conditionsTitle">Natural Conditions</h3>

<select id="disaster">

<option>Flood</option>
<option>Earthquake</option>
<option>Cyclone</option>
<option>Wildfire</option>
<option>Landslide</option>
<option>Tsunami</option>
<option>Drought</option>
<option>Heatwave</option>
<option>Industrial Accident</option>
<option>Pandemic</option>     
<option>Avalanche</option>
<option>Volcanic eruption</option>
<option>Thunder storm</option>
</select>

<br>

<select id="severity">

<option value="1">Low Severity</option>
<option value="2">Medium Severity</option>
<option value="3">High Severity</option>

</select>

<br>

<input type="number" id="people" placeholder="Affected Population">

<br>

<input type="text" id="location" placeholder="Location">

<button class="voiceBtn" onclick="startVoice()">🎤 Speak Location</button>

<br>

<button onclick="predict()">Analyze Disaster</button>

<div class="summary" id="summary"></div>

<div class="dashboard" id="dashboard"></div>

</div>

<div class="chart">
<canvas id="resourceChart"></canvas>
</div>

<div class="map">

<iframe
id="mapFrame"
width="80%"
height="400"
frameborder="0"
style="border:0"
src="https://maps.google.com/maps?q=India&t=&z=5&ie=UTF8&iwloc=&output=embed">
</iframe>
<h2>🚑 Rescue Route Optimization</h2>

<input type="text" id="rescueStart" placeholder="Rescue Team Location">

<input type="text" id="rescueEnd" placeholder="Disaster Location">

<button onclick="findRoute()">Find Route</button>

<div id="routeResult"></div>
 <iframe
id="routeMap"
width="80%"
height="400"
src="https://maps.google.com/maps?q=India&output=embed">
</iframe>

</div>

<script>
document.getElementById("time").innerHTML=new Date().toLocaleString();

function findRoute(){

let start=document.getElementById("rescueStart").value;
let end=document.getElementById("rescueEnd").value;

if(start=="" || end==""){
alert("Enter both locations");
return;
}

document.getElementById("routeMap").src=
"https://www.google.com/maps?q="+start+" to "+end+"&output=embed";

document.getElementById("routeResult").innerHTML=
"Fastest route from "+start+" to "+end;

}

let chart;
function changeLanguage(){

let lang=document.getElementById("language").value;

if(lang==="hi"){

document.getElementById("analysisTitle").innerText="आपदा विश्लेषण";

document.getElementById("conditionsTitle").innerText="प्राकृतिक स्थितियाँ";

document.getElementById("people").placeholder="प्रभावित जनसंख्या";

document.getElementById("location").placeholder="स्थान";

}

else if(lang==="mr"){

document.getElementById("analysisTitle").innerText="आपत्ती विश्लेषण";

document.getElementById("conditionsTitle").innerText="नैसर्गिक परिस्थिती";

document.getElementById("people").placeholder="प्रभावित लोकसंख्या";

document.getElementById("location").placeholder="स्थान";

}

else{

document.getElementById("analysisTitle").innerText="Disaster Analysis";

document.getElementById("conditionsTitle").innerText="Natural Conditions";

document.getElementById("people").placeholder="Affected Population";

document.getElementById("location").placeholder="Location";

}

}

function startVoice(){

let recognition = new webkitSpeechRecognition();

recognition.lang="en-IN";

recognition.onresult=function(event){

let speech=event.results[0][0].transcript;

document.getElementById("location").value=speech;

};

recognition.start();

}
document.getElementById("time").innerHTML=new Date().toLocaleString();

function findRoute(){

let start=document.getElementById("rescueStart").value;
let end=document.getElementById("rescueEnd").value;

if(start=="" || end==""){
alert("Enter both locations");
return;
}

document.getElementById("routeMap").src=
"https://www.google.com/maps?q="+start+" to "+end+"&output=embed";

document.getElementById("routeResult").innerHTML=
"Fastest route from "+start+" to "+end;

}

function predict(){

let disaster=document.getElementById("disaster").value;
let severity=parseInt(document.getElementById("severity").value);
let people=parseInt(document.getElementById("people").value);
let location=document.getElementById("location").value;

if(!people || location==""){
alert("Please fill all fields");
return;
}

let food=people*2*severity;
let water=people*3*severity;
let medical=Math.ceil(people/10)*severity;
let shelters=Math.ceil(people/25);
let rescue=Math.ceil(people/50)*severity;
let volunteers=Math.ceil(people/20);

document.getElementById("summary").innerHTML=

`
<h4>📍 ${location}</h4>

Disaster: <b>${disaster}</b><br>

Affected People: <b>${people}</b><br>

Severity Level: <b>${severity}</b>
`;

document.getElementById("dashboard").innerHTML=

`
<div class="card">🍞<br>Food Packets<br><b>${food}</b>
<div class="unit">packets</div>
</div>

<div class="card">💧<br>Water Bottles<br><b>${water}</b>
<div class="unit">Liters</div>                        
</div>

<div class="card">🏥<br>Medical Kits<br><b>${medical}</b></div>

<div class="card">🏠<br>Shelters<br><b>${shelters}</b>
<div class="unit">camps needed</div>
</div>

<div class="card">🚑<br>Rescue Teams<br><b>${rescue}</b>
<div class="unit">teams deployed</div>
</div>

<div class="card">👷<br>Volunteers<br><b>${volunteers}</b></div>
<section style="margin-top:30px">

<h2 class="inventoryTitle">📦 AI Resource Prediction</h2>
<div class="card">🚑 Ambulances<br><b>${ambulances}</b></div>
<div class="card">🚒 Fire Trucks<br><b>${firetrucks}</b></div>
<div class="card">🏥 Medical Teams<br><b>${medicalteams}</b></div>
<div class="card">🚁 Helicopters<br><b>${helpcopters}</b></div>
</div>

</section>
`;

document.getElementById("mapFrame").src=

`https://maps.google.com/maps?q=${location}&t=&z=8&ie=UTF8&iwloc=&output=embed`;

createChart(food,water,medical,shelters,rescue,volunteers);

}
let alert="Low Risk";

if(severity==2) alert="Moderate Risk";
if(severity==3) alert="Critical Emergency";

document.getElementById("summary").innerHTML+=
`<br><br>⚠️ Risk Level: <b>${alert}</b>`;
function createChart(food,water,medical,shelters,rescue,volunteers){

let ctx=document.getElementById("resourceChart");

if(chart){
chart.destroy();
}

chart=new Chart(ctx,{

type:'bar',

data:{
labels:["Food","Water","Medical","Shelters","Rescue","Volunteers"],

datasets:[{

label:"Required Resources",

data:[food,water,medical,shelters,rescue,volunteers]

}]

}

});

}

</script>

</body>

</html>
