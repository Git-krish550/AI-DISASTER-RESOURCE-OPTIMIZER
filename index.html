<!DOCTYPE html><html lang="en"><head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Disaster Resource Optimizer</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.app{
width:390px;
background:#f4f7fb;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

header{
background:linear-gradient(90deg,#0d47a1,#1976d2);
color:rgb(252, 252, 252);
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

header select{
margin-top:10px;
padding:6px;
border-radius:6px;
border:none;
}

.container{
padding:20px;
text-align:center;
}

input,select{
width:90%;
padding:12px;
margin:8px;
border-radius:8px;
border:1px solid #a12020;
font-size:15px;
}

button{
width:90%;
padding:12px;
margin-top:10px;
background:#1976d2;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.voiceBtn{
background:#ff5252;
}

.summary{
background:rgb(255, 255, 255);
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card{
background:rgb(245, 245, 245);
border-radius:12px;
padding:15px;
margin:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
display:inline-block;
width:140px;
font-size:14px;
}

.dashboard{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.chart{
padding:20px;
}

.map iframe{
border-radius:10px;
margin-top:15px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:390px;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.nav-item{
text-align:center;
font-size:13px;
}

@media(max-width:420px){

.app{
width:100%;
height:100vh;
border-radius:0;
}

.bottom-nav{
width:100%;
}

}

</style></head><body><div class="app"><header>
🚨 Disaster Optimizer<br><select id="language" onchange="changeLanguage()">
<option value="en">English</option>
<option value="hi">हिन्दी</option>
<option value="mr">मराठी</option>
</select></header><div class="container"><h3>🌍 System Status: <span style="color:green">Active</span></h3>
<p>Last Update: <span id="time"></span></p><div class="summary"><h3>📞 Emergency Contacts</h3><div class="card">🚑 Ambulance<br>102</div>
<div class="card">🚒 Fire<br>101</div>
<div class="card">🚓 Police<br>100</div>
<div class="card">🆘 Disaster<br>108</div></div><h3 id="analysisTitle">Disaster Analysis</h3><select id="disaster">
<option>Flood</option>
<option>Earthquake</option>
<option>Cyclone</option>
<option>Wildfire</option>
<option>Landslide</option>
<option>Tsunami</option>
<option>Drought</option>
<option>Heatwave</option>
</select><select id="severity">
<option value="1">Low Severity</option>
<option value="2">Medium Severity</option>
<option value="3">High Severity</option>
</select><input type="number" id="people" placeholder="Affected Population"><input type="text" id="location" placeholder="Location"><button class="voiceBtn" onclick="startVoice()">🎤 Speak Location</button>

<button onclick="predict()">Analyze Disaster</button>

<div class="summary" id="summary"></div><div class="summary" id="risk"></div><div class="dashboard" id="dashboard"></div><div class="card" style="width:90%">
<h3>🌦 Weather</h3>
<p id="weather">Weather will appear here</p>
</div>

<div class="chart">
<canvas id="resourceChart"></canvas>
</div>

</div><div class="container map"><iframe
id="mapFrame"
width="100%"
height="300"
src="https://maps.google.com/maps?q=India&output=embed">
</iframe><h3>🚑 Rescue Route</h3><input type="text" id="rescueStart" placeholder="Rescue Team Location"><input type="text" id="rescueEnd" placeholder="Disaster Location"><button onclick="findRoute()">Find Route</button>

<div id="routeResult"></div><iframe
id="routeMap"
width="100%"
height="300"
src="https://maps.google.com/maps?q=India&output=embed">
</iframe></div></div><div class="bottom-nav"><div class="nav-item">🏠<br>Home</div>
<div class="nav-item">📊<br>Dashboard</div>
<div class="nav-item">🗺<br>Map</div>
<div class="nav-item">⚙<br>Settings</div></div><script>

document.getElementById("time").innerHTML=new Date().toLocaleString();

let chart;

function changeLanguage(){

let lang=document.getElementById("language").value;

if(lang==="hi"){
document.getElementById("analysisTitle").innerText="आपदा विश्लेषण";
document.getElementById("people").placeholder="प्रभावित जनसंख्या";
document.getElementById("location").placeholder="स्थान";
}

else if(lang==="mr"){
document.getElementById("analysisTitle").innerText="आपत्ती विश्लेषण";
document.getElementById("people").placeholder="प्रभावित लोकसंख्या";
document.getElementById("location").placeholder="स्थान";
}

else{
document.getElementById("analysisTitle").innerText="Disaster Analysis";
document.getElementById("people").placeholder="Affected Population";
document.getElementById("location").placeholder="Location";
}

}

function startVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Speech recognition not supported");
return;
}

let recognition=new SpeechRecognition();

recognition.lang="en-IN";

recognition.onresult=function(event){
document.getElementById("location").value=event.results[0][0].transcript;
};

recognition.start();

}

function getWeather(location){

fetch("https://wttr.in/"+location+"?format=3")
.then(response=>response.text())
.then(data=>{
document.getElementById("weather").innerHTML=data;
});

}

function findRoute(){

let start=document.getElementById("rescueStart").value;
let end=document.getElementById("rescueEnd").value;

if(start=="" || end==""){
alert("Enter both locations");
return;
}

document.getElementById("routeMap").src=
"https://maps.google.com/maps?saddr="+start+"&daddr="+end+"&output=embed";

document.getElementById("routeResult").innerHTML=
"Fastest route from "+start+" to "+end;

}

function predict(){

let disaster=document.getElementById("disaster").value;
let severity=parseInt(document.getElementById("severity").value);
let people=parseInt(document.getElementById("people").value);
let location=document.getElementById("location").value;

if(!people || location==""){
alert("Fill all fields");
return;
}

let food=people*2*severity;
let water=people*3*severity;
let medical=Math.ceil(people/10)*severity;
let shelters=Math.ceil(people/25);
let rescue=Math.ceil(people/50)*severity;
let volunteers=Math.ceil(people/20);

let ambulances=Math.ceil(people/100);
let firetrucks=Math.ceil(people/200);
let medicalteams=Math.ceil(people/150);
let helicopters=Math.ceil(people/500);

document.getElementById("summary").innerHTML=
`📍 ${location}<br>
Disaster: <b>${disaster}</b><br>
People: <b>${people}</b>`;

let risk="Low Risk";

if(severity==2) risk="Medium Risk";
if(severity==3 || people>1000) risk="High Risk";

document.getElementById("risk").innerHTML="⚠ "+risk;

let waterDisasters=["Flood","Cyclone","Tsunami"];

let dashboardHTML=

`<div class="card">🍞 Food packets<br>${food}</div>
<div class="card">💧 Water<br>${water}</div>
<div class="card">🏥 Medical kits<br>${medical}</div>
<div class="card">🏠 Shelters<br>${shelters}</div>
<div class="card">🚑 Rescue teams<br>${rescue}</div>
<div class="card">👷 Volunteers<br>${volunteers}</div>
<div class="card">🚑 Ambulances<br>${ambulances}</div>
<div class="card">🏥 Med Teams<br>${medicalteams}</div>
<div class="card">🚁 Helicopters<br>${helicopters}</div>`;

if(!waterDisasters.includes(disaster)){
dashboardHTML+=`<div class="card">🚒 Firetrucks<br>${firetrucks}</div>`;
}

document.getElementById("dashboard").innerHTML=dashboardHTML;

document.getElementById("mapFrame").src=
`https://maps.google.com/maps?q=${location}&output=embed`;

getWeather(location);

createChart(food,water,medical,shelters,rescue,volunteers);

}

function createChart(food,water,medical,shelters,rescue,volunteers){

let ctx=document.getElementById("resourceChart").getContext("2d");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'bar',
data:{
labels:["Food","Water","Medical","Shelters","Rescue","Volunteers"],
datasets:[{
label:"Resources",
data:[food,water,medical,shelters,rescue,volunteers]
}]
}
});

}

</script></body>
</html>
