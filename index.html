<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Disaster Resource Optimizer</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
text-align:center;
}

header{
background:#0d47a1;
color:white;
padding:20px;
font-size:30px;
}

.container{
margin-top:30px;
}

select,input{
padding:12px;
margin:10px;
width:260px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:12px 30px;
background:#0d47a1;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#08306b;
}

.dashboard{
margin-top:30px;
}

.card{
display:inline-block;
background:white;
padding:20px;
margin:10px;
border-radius:10px;
box-shadow:0px 3px 10px rgba(0,0,0,0.1);
width:180px;
font-size:18px;
}

.summary{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
display:inline-block;
box-shadow:0px 3px 10px rgba(0,0,0,0.1);
}

.map{
margin-top:40px;
}

</style>

</head>

<body>

<header>
🚨 AI Disaster Resource Optimizer
</header>

<div class="container">

<h2>Smart Disaster Relief Planning</h2>

<select id="disaster">

<option>Flood</option>
<option>Earthquake</option>
<option>Cyclone</option>
<option>Wildfire</option>
<option>Landslide</option>
<option>Tsunami</option>
<option>Drought</option>
<option>Industrial Accident</option>
<option>Heatwave</option>
<option>Pandemic</option>

</select>

<br>

<select id="severity">

<option value="1">Low Severity</option>
<option value="2">Medium Severity</option>
<option value="3">High Severity</option>

</select>

<br>

<input type="number" id="people" placeholder="Affected People">

<br>

<input type="text" id="location" placeholder="Location">

<br>

<button onclick="predict()">Analyze Disaster</button>

<div class="summary" id="summary"></div>

<div class="dashboard" id="dashboard"></div>

</div>

<div class="map">

<iframe
id="mapFrame"
width="80%"
height="400"
frameborder="0"
style="border:0"
src="https://maps.google.com/maps?q=India&t=&z=5&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

<script>

function predict(){

let disaster=document.getElementById("disaster").value;
let severity=parseInt(document.getElementById("severity").value);
let people=parseInt(document.getElementById("people").value);
let location=document.getElementById("location").value;

if(!people || location==""){
alert("Please fill all fields");
return;
}

let food=people*2*severity;
let water=people*3*severity;
let medical=Math.ceil(people/10)*severity;
let shelters=Math.ceil(people/25);
let rescue=Math.ceil(people/50)*severity;
let volunteers=Math.ceil(people/20);

document.getElementById("summary").innerHTML=

`
<h3>📍 ${location}</h3>

Disaster: <b>${disaster}</b><br>
Affected People: <b>${people}</b><br>
Severity Level: <b>${severity}</b>
`;

document.getElementById("dashboard").innerHTML=

`
<div class="card">🍞<br>Food Packs<br><b>${food}</b></div>

<div class="card">💧<br>Water Bottles<br><b>${water}</b></div>

<div class="card">🏥<br>Medical Kits<br><b>${medical}</b></div>

<div class="card">🏠<br>Shelters<br><b>${shelters}</b></div>

<div class="card">🚑<br>Rescue Teams<br><b>${rescue}</b></div>

<div class="card">👷<br>Volunteers<br><b>${volunteers}</b></div>
`;

document.getElementById("mapFrame").src=

`https://maps.google.com/maps?q=${location}&t=&z=8&ie=UTF8&iwloc=&output=embed`;

}

</script>

</body>

</html>
